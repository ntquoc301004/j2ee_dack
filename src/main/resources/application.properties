# Kết nối database
spring.datasource.url=jdbc:mysql://localhost:3306/db_j2ee_dack?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cấu hình lưu file ảnh (phục vụ câu 2)
logging.level.org.springframework.security=DEBUG

# Gửi form liên hệ qua email
contact.inbox=ntquoc301004@gmail.com

# SMTP Gmail (dùng mật khẩu ứng dụng):
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ntquoc301004@gmail.com
# Đặt MAIL_PASSWORD (hoặc spring.mail.password trong application-local.properties)
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# (Tùy chọn) URL công khai khi chạy sau reverse proxy — dùng cho liên kết đặt lại mật khẩu trong email
# app.public-base-url=https://ten-mien-cua-ban.com

# --- Đăng nhập Google (OAuth 2.0 / OpenID) ---
# 1) Google Cloud Console → APIs & Services → Credentials → Create OAuth client ID (Web application).
# 2) Authorized redirect URIs: http://localhost:8080/login/oauth2/code/google (thêm domain thật khi deploy).
# 3) Đặt biến môi trường GOOGLE_CLIENT_ID và GOOGLE_CLIENT_SECRET, hoặc ghi trong application-local.properties (đã gitignore).
# Để trống cả hai → ứng dụng chạy bình thường, chỉ không hiện nút đăng nhập Google.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email