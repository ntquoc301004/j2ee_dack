<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(~{:: main}, ~{:: scripts})}">
<body>
<main th:fragment="main" class="admin-books-page">
    <div class="admin-flash success" th:if="${flash}" th:text="${flash}"></div>

    <div class="admin-card admin-books-toolbar">
        <div>
            <h2 class="admin-books-title">Danh mục sách</h2>
            <p class="admin-books-sub muted">Nhóm thể loại hiển thị trên cửa hàng và form sách</p>
        </div>
        <a class="admin-btn-primary" th:href="@{/admin/categories/new}">
            <span aria-hidden="true">+</span> Thêm danh mục
        </a>
    </div>

    <div class="admin-card admin-table-card">
        <div class="admin-table-wrap">
            <table class="admin-data-table">
                <thead>
                <tr>
                    <th>Tên danh mục</th>
                    <th class="num">Số đầu sách</th>
                    <th class="actions">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.name}">Tên</td>
                    <td class="num" th:text="${bookCountByCategoryId[c.id]}">0</td>
                    <td class="actions">
                        <a class="admin-link-edit" th:href="@{'/admin/categories/' + ${c.id} + '/edit'}">Sửa</a>
                        <form th:action="@{'/admin/categories/' + ${c.id} + '/delete'}" method="post" class="admin-inline-form"
                              onsubmit="return confirm('Xóa danh mục này?');">
                            <button type="submit" class="admin-btn-danger">Xóa</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <p class="muted small admin-empty-note" th:if="${#lists.isEmpty(categories)}">Chưa có danh mục.</p>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
