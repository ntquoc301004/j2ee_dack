<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(~{:: main}, ~{:: scripts})}">
<body>
<main th:fragment="main" class="admin-book-form-page">
    <div class="admin-card admin-book-form-card">
        <div class="admin-books-toolbar admin-form-head">
            <div>
                <h2 class="admin-books-title" th:text="${category.id == null ? 'Thêm danh mục' : 'Sửa danh mục'}">Danh mục</h2>
                <p class="admin-books-sub muted">Tên hiển thị cho khách và trong bộ lọc</p>
            </div>
            <a class="admin-btn-ghost" th:href="@{/admin/categories}">← Danh sách</a>
        </div>

        <form class="admin-form" th:action="${category.id == null} ? @{/admin/categories} : @{'/admin/categories/' + ${category.id}}"
              th:object="${category}" method="post">
            <input type="hidden" th:if="${category.id != null}" th:field="*{id}"/>
            <div class="admin-form-grid">
                <label class="admin-form-span2">
                    <span>Tên danh mục</span>
                    <input type="text" th:field="*{name}" required maxlength="80" placeholder="Ví dụ: Manga, Comic Mỹ"/>
                    <small class="admin-field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
                </label>
            </div>
            <div class="admin-form-actions">
                <a class="admin-btn-ghost" th:href="@{/admin/categories}">Hủy</a>
                <button class="admin-btn-primary" type="submit" th:text="${category.id == null ? 'Tạo mới' : 'Lưu'}">Lưu</button>
            </div>
        </form>
    </div>
</main>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
