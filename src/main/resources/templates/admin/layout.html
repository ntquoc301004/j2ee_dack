<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="adminLayout (main, scripts)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${adminPageTitle} + ' · Quản trị'">Quản trị</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/glacial-indifference"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}"/>
</head>
<body class="admin-body">
<div class="admin-shell">
    <aside class="admin-sidebar">
        <a class="admin-brand" th:href="@{/admin/dashboard}">
            <img class="admin-brand-img" th:src="@{/images/logo.png}" alt="ComicStore"/>
            <span class="admin-brand-text">BOOKIE</span>
        </a>
        <nav class="admin-nav">
            <a class="admin-nav-link" th:href="@{/admin/dashboard}"
               th:classappend="${adminNavActive == 'dashboard'} ? ' active' : ''">
                <span class="admin-nav-ico"><i class="fa-solid fa-chart-line"></i></span> Bảng điều khiển
            </a>
            <a class="admin-nav-link" th:href="@{/admin/books}"
               th:classappend="${adminNavActive == 'books'} ? ' active' : ''">
                <span class="admin-nav-ico"><i class="fa-solid fa-book"></i></span> Quản lý sách
            </a>
            <a class="admin-nav-link" th:href="@{/admin/categories}"
               th:classappend="${adminNavActive == 'categories'} ? ' active' : ''">
                <span class="admin-nav-ico"><i class="fa-solid fa-tags"></i></span> Danh mục
            </a>
            <a class="admin-nav-link" th:href="@{/admin/orders}"
               th:classappend="${adminNavActive == 'orders'} ? ' active' : ''">
                <span class="admin-nav-ico"><i class="fa-regular fa-clipboard"></i></span> Đơn hàng
            </a>
            <a class="admin-nav-link" th:href="@{/home}">
                <span class="admin-nav-ico"><i class="fa-solid fa-store"></i></span> Xem cửa hàng
            </a>
        </nav>
        <form class="admin-logout" th:action="@{/logout}" method="post">
            <button type="submit">Đăng xuất</button>
        </form>
    </aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <h1 class="admin-page-heading" th:text="${adminPageTitle}">Trang</h1>
                <p class="admin-welcome">
                    Xin chào <strong th:text="${adminDisplayName}">Admin</strong>, chào mừng trở lại
                </p>
            </div>
            <div class="admin-topbar-actions">
                <a class="admin-btn-ghost" th:href="@{/home}">Xem cửa hàng</a>
            </div>
        </header>
        <div class="admin-content" th:replace="${main}"></div>
    </div>
</div>
<th:block th:replace="${scripts}"></th:block>
</body>
</html>
