<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/auth-layout :: authLayout(~{:: section}, 'Đăng nhập · BOOKIE STORE')}">
<body>
<section class="auth-split">
    <div class="auth-split-visual" aria-hidden="true">
        <span class="auth-deco c1"></span>
        <span class="auth-deco t1"></span>
        <span class="auth-deco sq"></span>
        <span class="auth-deco t2"></span>
        <div class="auth-blob">
            <svg class="auth-laptop-svg" viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="48" y="36" width="184" height="118" rx="10" fill="#4a4a4a"/>
                <rect x="58" y="48" width="164" height="88" rx="4" fill="#3a3a3a"/>
                <circle cx="140" cy="92" r="22" stroke="#fff" stroke-width="3" fill="none"/>
                <path d="M140 104v12M128 98c4 8 8 12 12 12s8-4 12-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <path d="M76 166h128l-8 18H84l-8-18z" fill="#6d6d6d"/>
                <rect x="40" y="162" width="200" height="8" rx="2" fill="#8a8a8a"/>
            </svg>
        </div>
    </div>

    <div class="auth-panel">
        <h1 class="auth-title">Đăng nhập thành viên</h1>
        <p class="auth-sub">Chào mừng trở lại BOOKIE STORE. Đăng nhập để mua sách và theo dõi đơn hàng.</p>

        <div class="auth-param-flash err" th:if="${param.error}">Đăng nhập thất bại: sai tài khoản/mật khẩu, hoặc đăng nhập Google không thành công.</div>
        <div class="auth-param-flash ok" th:if="${param.logout}">Bạn đã đăng xuất</div>

        <a th:if="${googleOAuthLoginEnabled}" class="auth-google-btn" th:href="@{/oauth2/authorization/google}">
            <span class="auth-google-ico" aria-hidden="true">
                <svg viewBox="0 0 48 48" width="20" height="20" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.209 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.86 11.86 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
            </span>
            Đăng nhập bằng Google
        </a>

        <p th:if="${googleOAuthLoginEnabled}" class="auth-divider"><span>hoặc</span></p>

        <form class="auth-form" th:action="@{/login}" method="post">
            <div class="auth-field">
                <span class="auth-field-ico" aria-hidden="true"><i class="fa-regular fa-user"></i></span>
                <input type="text" name="username" autocomplete="username" placeholder="Tên đăng nhập" required/>
            </div>
            <div class="auth-field">
                <span class="auth-field-ico" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
                <input type="password" name="password" autocomplete="current-password" placeholder="Mật khẩu" required/>
            </div>
            <button type="submit" class="auth-submit">Đăng nhập</button>
        </form>

        <a class="auth-forgot" th:href="@{/forgot-password}">Quên mật khẩu?</a>

        <div class="auth-footer-row">
            <a class="auth-alt-link" th:href="@{/register}">
                Tạo tài khoản mới <span class="arr">→</span>
            </a>
        </div>
    </div>
</section>
</body>
</html>
