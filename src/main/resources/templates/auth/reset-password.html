<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/auth-layout :: authLayout(~{:: section}, 'Đặt lại mật khẩu · ComicStore')}">
<body>
<section class="auth-split">
    <div class="auth-split-visual" aria-hidden="true">
        <span class="auth-deco c1"></span>
        <span class="auth-deco t1"></span>
        <span class="auth-deco sq"></span>
        <span class="auth-deco t2"></span>
        <div class="auth-blob">
            <svg class="auth-laptop-svg" viewBox="0 0 280 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="48" y="36" width="184" height="118" rx="10" fill="#4a4a4a"/>
                <rect x="58" y="48" width="164" height="88" rx="4" fill="#3a3a3a"/>
                <circle cx="140" cy="92" r="22" stroke="#fff" stroke-width="3" fill="none"/>
                <path d="M140 104v12M128 98c4 8 8 12 12 12s8-4 12-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <path d="M76 166h128l-8 18H84l-8-18z" fill="#6d6d6d"/>
                <rect x="40" y="162" width="200" height="8" rx="2" fill="#8a8a8a"/>
            </svg>
        </div>
    </div>

    <div class="auth-panel">
        <h1 class="auth-title">Đặt lại mật khẩu</h1>
        <p class="auth-sub">Nhập mật khẩu mới cho tài khoản của bạn.</p>

        <form class="auth-form" th:action="@{/reset-password}" method="post" th:object="${form}">
            <input type="hidden" name="token" th:value="${token}"/>
            <div class="auth-field-group">
                <div class="auth-field">
                    <span class="auth-field-ico" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" th:field="*{newPassword}" autocomplete="new-password" placeholder="8+ ký tự: hoa, thường, số, ký tự đặc biệt" required/>
                </div>
                <p class="auth-err" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>
            </div>
            <div class="auth-field-group">
                <div class="auth-field">
                    <span class="auth-field-ico" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" th:field="*{confirmPassword}" autocomplete="new-password" placeholder="Nhập lại mật khẩu" required/>
                </div>
                <p class="auth-err" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
            </div>
            <p class="auth-err" th:if="${#fields.hasErrors('passwordMatching')}" th:errors="*{passwordMatching}"></p>

            <button type="submit" class="auth-submit">Lưu mật khẩu mới</button>
        </form>

        <div class="auth-footer-row">
            <a class="auth-alt-link" th:href="@{/login}">
                ← Đăng nhập
            </a>
        </div>
    </div>
</section>
</body>
</html>
