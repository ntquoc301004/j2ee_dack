<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:fragment="authLayout(content, title)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} ?: 'BOOKIE'">BOOKIE</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/glacial-indifference"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth-split.css}"/>
</head>
<body class="auth-body">
<div class="auth-top-strip">Khuyến mãi tuần này: Freeship đơn từ 200.000 đ</div>
<header class="auth-header">
    <a class="auth-brand" th:href="@{/home}">
        <img class="auth-brand-img" th:src="@{/images/logo.png}" alt="ComicStore"/>
        <span class="auth-brand-text">BOOKIE</span>
    </a>
    <a class="auth-header-link" th:href="@{/home}"><i class="fa-solid fa-arrow-left"></i> Về cửa hàng</a>
</header>
<main class="auth-main">
    <div class="flash auth-flash" th:if="${flash}" th:text="${flash}"></div>
    <section th:replace="${content}"></section>
</main>
</body>
</html>
